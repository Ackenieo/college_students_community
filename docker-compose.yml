services:
  mysql:
    image: mysql:8.0
    container_name: college-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: college_students
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p123456 --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - college-net

  redis:
    image: redis:7.2-alpine
    container_name: college-redis
    restart: unless-stopped
    command: redis-server --requirepass 123456 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a 123456 ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - college-net

  mongodb:
    image: mongo:7
    container_name: college-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: 123456
      MONGO_INITDB_DATABASE: college_community
      TZ: Asia/Shanghai
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username root --password 123456 --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - college-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: college-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: root
      RABBITMQ_DEFAULT_PASS: 123456
      TZ: Asia/Shanghai
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - college-net

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: college-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      TZ: Asia/Shanghai
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-logs:/home/nacos/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8848/nacos/v1/console/health/readiness | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s
    networks:
      - college-net

  user-server:
    build:
      context: .
      dockerfile: user-server/Dockerfile
    container_name: college-user-server
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: dev
      SPRING_CONFIG_IMPORT: optional:nacos:nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/college_students?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: 123456
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_IMPORT_CHECK_ENABLED: "false"
      SPRING_MAIL_USERNAME: 123456
      SPRING_MAIL_PASSWORD: 123456
      JWT_SECRET: "12345678901234567890123456789012"
      JWT_EXPIRATION: 86400000
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - college-net

  community-server:
    build:
      context: .
      dockerfile: community-server/Dockerfile
    container_name: college-community-server
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/college_students?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: 123456
      SPRING_DATA_MONGODB_URI: mongodb://root:123456@mongodb:27017/college_community?authSource=admin
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: root
      SPRING_RABBITMQ_PASSWORD: 123456
      SPRING_CLOUD_CONFIG_ENABLED: "false"
      SPRING_CLOUD_CONFIG_IMPORT_CHECK_ENABLED: "false"
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      ALIYUN_OSS_ENABLED: "false"
      ALIYUN_OSS_ACCESS_KEY_ID: 123456
      ALIYUN_OSS_ACCESS_KEY_SECRET: 123456
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - college-net

  agent-server:
    build:
      context: .
      dockerfile: agent-server/Dockerfile
    container_name: college-agent-server
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: 123456
      SPRING_CLOUD_CONFIG_ENABLED: "false"
      SPRING_CLOUD_CONFIG_IMPORT_CHECK_ENABLED: "false"
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      EUREKA_CLIENT_ENABLED: "false"
      DIFY_API_BASE_URL: http://host.docker.internal/v1
      DIFY_API_API_KEY: 123456
    ports:
      - "8083:8083"
    depends_on:
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - college-net

  notification-server:
    build:
      context: .
      dockerfile: notification-server/Dockerfile
    container_name: college-notification-server
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: 123456
      SPRING_DATA_MONGODB_URI: mongodb://root:123456@mongodb:27017/college_community?authSource=admin
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: root
      SPRING_RABBITMQ_PASSWORD: 123456
      SPRING_CLOUD_CONFIG_ENABLED: "false"
      SPRING_CLOUD_CONFIG_IMPORT_CHECK_ENABLED: "false"
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_MAIL_USERNAME: 123456
      SPRING_MAIL_PASSWORD: 123456
      NOTIFICATION_EMAIL_FROM_ADDRESS: 123456
    ports:
      - "8084:8084"
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - college-net

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: college-api-gateway
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: dev
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_USERNAME: nacos
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: nacos
      JWT_SECRET: "12345678901234567890123456789012"
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    depends_on:
      nacos:
        condition: service_healthy
      user-server:
        condition: service_started
      community-server:
        condition: service_started
      agent-server:
        condition: service_started
      notification-server:
        condition: service_started
    networks:
      - college-net

networks:
  college-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  mongo-data:
  rabbitmq-data:
  nacos-data:
  nacos-logs:
