# Application Server Port
server:
  port: 8081

# Spring Configuration
spring:
  application:
    name: user-server
  profiles:
    active: dev

  config:
    import: optional:nacos:localhost:8848

  # Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/college_students?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:your_mysql_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:your_redis_password}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # Nacos Configuration
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: public
        group: DEFAULT_GROUP
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:your_nacos_password}
      config:
        import-check:
          enabled: false
        server-addr: ${NACOS_ADDR:localhost:8848}

  # Email Configuration
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your_email@qq.com}
    password: ${MAIL_PASSWORD:your_smtp_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # MVC Configuration
  mvc:
    converters:
      preferred-json-mapper: jackson

# OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  packages-to-scan: org.example.userserver.controller
  openapi:
    info:
      title: User Service API
      description: User management APIs
      version: 0.0.1
  group-configs:
    - group: user-server
      packages-to-scan: org.example.userserver.controller

# Knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your_jwt_secret_key_base64_encoded}
  expiration: ${JWT_EXPIRATION:86400000}

# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      userService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: TIME_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10s
        failureRateThreshold: 50

# Authentication Configuration
auth:
  login:
    email-password-enabled: true
  register:
    email-verify-enabled: true
    verify-code-expiration-seconds: 600
    rate-limit-window-seconds: 3600
    rate-limit-max-actions: 10
  password-reset:
    email-verify-enabled: true
    verify-code-expiration-seconds: 600

# Verification Code Configuration
verify-code:
  per-email-min-interval-seconds: 60
  length: 6
  digits-only: true
