# Application Server Port
server:
  port: 8082

# Spring Configuration
spring:
  application:
    name: community-server
  profiles:
    active: dev

  # Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/college_students?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:your_mysql_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQL8Dialect

  data:
    mongodb:
      uri: mongodb://${MONGO_USERNAME:root}:${MONGO_PASSWORD:your_mongo_password}@localhost:27017/college_community?authSource=admin
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:your_redis_password}
      database: 1
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # Service Discovery (Nacos)
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: public
        group: DEFAULT_GROUP
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:your_nacos_password}

  # RabbitMQ Configuration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:root}
    password: ${RABBITMQ_PASSWORD:your_rabbitmq_password}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  packages-to-scan: org.example.communityserver.controller
  openapi:
    info:
      title: Community Service API
      description: Community posts, comments, likes APIs
      version: 0.0.1
  group-configs:
    - group: community-server
      packages-to-scan: org.example.communityserver.controller

# Knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: true

# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      communityService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: TIME_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10s
        failureRateThreshold: 50

# Logging
logging:
  level:
    org.example.communityserver: DEBUG

# Aliyun OSS Configuration
aliyun:
  oss:
    enabled: ${OSS_ENABLED:false}
    endpoint: ${OSS_ENDPOINT:oss-cn-guangzhou.aliyuncs.com}
    access-key-id: ${OSS_ACCESS_KEY_ID:your_oss_access_key_id}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:your_oss_access_key_secret}
    bucket: ${OSS_BUCKET:your_oss_bucket}
    policy-expiration-seconds: 600
    max-size-bytes: 20971520

# Upload Configuration
upload:
  post:
    enabled: true
    allowed-mime-types:
      - image/jpeg
      - image/png
      - image/gif
      - application/pdf
    max-file-count: 9

# Review Fallback
review:
  fallback:
    enabled: true
    ai-review-enabled: false
    approve-on-unavailable: true

# Notification Service
notification:
  service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
