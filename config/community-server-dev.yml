# 社区服务开发环境配置
server:
  port: 8082

spring:
  application:
    name: community-server
  profiles:
    active: dev
  data:
    mongodb:
      uri: mongodb://localhost:27017/college_community
    redis:
      host: localhost
      port: 6379
      password: 
      database: 1
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

# Nacos服务发现配置
spring.cloud.nacos.discovery.server-addr=localhost:8848
spring.cloud.nacos.discovery.namespace=public
spring.cloud.nacos.discovery.group=DEFAULT_GROUP
spring.cloud.nacos.discovery.metadata.version=1.0.0
spring.cloud.nacos.discovery.metadata.region=beijing
spring.cloud.nacos.discovery.metadata.zone=zone1

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

resilience4j:
  circuitbreaker:
    instances:
      communityService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: TIME_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10s
        failureRateThreshold: 50

logging:
  level:
    org.example.communityserver: DEBUG
    org.springframework.cloud: DEBUG
