# 应用服务端口配置
server:
  port: 8080

# Spring 相关配置
spring:
  application:
    # 应用名称，用于注册与日志标识
    name: api-gateway
  cloud:
    # Spring Cloud Gateway 路由与过滤器
    gateway:
      routes:
        # 服务路由
        - id: user-service
          uri: lb://user-server
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=2
        - id: community-service
          uri: lb://community-server
          predicates:
            - Path=/api/community/**
          filters:
            - StripPrefix=2
        - id: agent-service
          uri: lb://agent-server
          predicates:
            - Path=/api/agent/**
          filters:
            - StripPrefix=2
        - id: notification-service
          uri: lb://notification-server
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=2
        # 2. Swagger 文档路由（核心调整：使用 v3 路径）
        - id: user-service-swagger
          uri: lb://user-server
          predicates:
            - Path=/v3/api-docs/user-service/**
          filters:
            - RewritePath=/v3/api-docs/user-service/(?<path>.*), /v3/api-docs/$\{path}
        - id: community-service-swagger
          uri: lb://community-server
          predicates:
            - Path=/v3/api-docs/community-service/**
          filters:
            - RewritePath=/v3/api-docs/community-service/(?<path>.*), /v3/api-docs/$\{path}
        - id: agent-service-swagger
          uri: lb://agent-server
          predicates:
            - Path=/v3/api-docs/agent-service/**
          filters:
            - RewritePath=/v3/api-docs/agent-service/(?<path>.*), /v3/api-docs/$\{path}
        - id: notification-service-swagger
          uri: lb://notification-server
          predicates:
            - Path=/v3/api-docs/notification-service/**
          filters:
            - RewritePath=/v3/api-docs/notification-service/(?<path>.*), /v3/api-docs/$\{path}

      # 全局过滤器：为请求添加常见头部
      default-filters:
        - AddRequestHeader=X-Forwarded-For, ${spring.cloud.client.ip-address}
        - AddRequestHeader=X-Forwarded-Proto, ${spring.cloud.client.scheme}
      # CORS 全局配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
    # 服务注册与发现（Nacos）
    nacos:
      discovery:
        server-addr: 8.148.189.41:8848
        namespace: public
        group: DEFAULT_GROUP
        username: nacos
        password: Root123_

knife4j:
  gateway:
    enabled: true
    services:
      - name: 用户服务
        location: /v3/api-docs/user-service  # 对应 v3 路由路径
      - name: 社区服务
        location: /v3/api-docs/community-service
      - name: AI代理审核服务
        location: /v3/api-docs/agent-service
      - name: 通知服务
        location: /v3/api-docs/notification-service

# Actuator 管理端点暴露
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# JWT配置
jwt:
  secret: college-students-secret-key-2024
  expiration: 86400000 # 24小时

# 日志级别配置
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
