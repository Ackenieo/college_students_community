# =============================================
# Redis 配置文件 - 大学生社区平台
# Redis Configuration for College Students Community Platform
# =============================================

# 基本配置
bind 0.0.0.0
port 6379
timeout 300
tcp-keepalive 60

# 数据库数量
databases 16

# 持久化配置
# RDB 持久化
save 900 1
save 300 10
save 60 10000

# RDB 文件配置
dbfilename dump.rdb
dir /var/lib/redis/

# AOF 持久化
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# 内存管理
maxmemory 2gb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# 安全配置
# requirepass CollegeRedis2024!

# 日志配置
loglevel notice
logfile /var/log/redis/redis-server.log

# 客户端配置
maxclients 10000

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 键空间通知
notify-keyspace-events "Ex"

# 网络配置
tcp-backlog 511

# 其他配置
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes

# 客户端输出缓冲区限制
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# 哈希配置
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# 列表配置
list-max-ziplist-size -2
list-compress-depth 0

# 集合配置
set-max-intset-entries 512

# 有序集合配置
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog 配置
hll-sparse-max-bytes 3000

# 流配置
stream-node-max-bytes 4096
stream-node-max-entries 100

# 活动重新哈希
activerehashing yes

# 客户端查询缓冲区
client-query-buffer-limit 1gb

# 协议缓冲区
proto-max-bulk-len 512mb

# 频率限制
hz 10

# 动态调整
dynamic-hz yes

# AOF 加载截断
aof-load-truncated yes

# RDB 校验
rdbchecksum yes

# 延迟监控
latency-monitor-threshold 100

# =============================================
# 应用特定的键命名规范
# =============================================

# 用户相关键
# user:{userId} - 用户信息缓存
# user:session:{sessionId} - 用户会话
# user:profile:{userId} - 用户资料缓存

# 验证码相关键
# verify:email:{email} - 邮箱验证码
# verify:sms:{phone} - 短信验证码

# 帖子相关键
# post:{postId} - 帖子信息缓存
# post:hot - 热门帖子列表
# post:latest - 最新帖子列表
# post:user:{userId} - 用户帖子列表

# 评论相关键
# comment:{commentId} - 评论信息缓存
# comment:post:{postId} - 帖子评论列表

# 点赞相关键
# like:post:{postId} - 帖子点赞列表
# like:comment:{commentId} - 评论点赞列表

# 好友关系键
# friend:{userId} - 用户好友列表
# friend:request:{userId} - 好友申请列表

# 消息相关键
# message:{messageId} - 消息内容
# message:unread:{userId} - 用户未读消息
# message:conversation:{userId1}:{userId2} - 对话消息

# 通知相关键
# notification:{userId} - 用户通知列表
# notification:unread:{userId} - 未读通知数量

# 系统配置键
# config:system - 系统配置
# config:email - 邮件配置
# config:security - 安全配置

# 统计相关键
# stats:daily:{date} - 每日统计
# stats:user:{userId} - 用户统计
# stats:post:{postId} - 帖子统计

# 限流相关键
# rate:limit:{resource}:{identifier} - 限流计数
# rate:window:{resource}:{identifier} - 滑动窗口

# 缓存过期时间配置
# 用户信息: 1小时
# 帖子信息: 30分钟
# 评论信息: 15分钟
# 验证码: 10分钟
# 会话信息: 24小时
# 统计信息: 1小时
