# 应用服务端口配置
server:
  port: 8083

# Spring 相关配置
spring:
  application:
    # 应用名称
    name: agent-server
  profiles:
    # 激活的运行环境
    active: dev
  cloud:
    # 配置中心
    config:
      enabled: true
      uri: http://localhost:8888
    # 服务注册与发现（Nacos）
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
        group: DEFAULT_GROUP
        metadata:
          version: 1.0.0
          region: beijing
          zone: zone1
  # Redis 连接与连接池
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 4
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

# Dify 配置
dify:
  api:
    base-url: http://localhost/v1
    api-key: your-dify-api-key
    timeout: 30000
    max-retries: 3
  agent:
    default-model: gpt-3.5-turbo
    max-tokens: 1000
    temperature: 0.7

# Eureka 客户端
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# Actuator 管理端点
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# 弹性容错配置
resilience4j:
  circuitbreaker:
    instances:
      difyAgent:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: TIME_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
  retry:
    instances:
      difyAgent:
        maxAttempts: 3
        waitDuration: 1000ms
        exponentialBackoffMultiplier: 2

# 日志级别
logging:
  level:
    org.example.agentserver: DEBUG
    org.springframework.cloud: DEBUG

# 帖子内容审核（Agent）
moderation:
  enabled: true
  # 内容审核命中阈值（0-1），高于则判定为包含敏感内容
  threshold: 0.6
  # 拒绝的类别（示例，具体以实现为准）
  blocked-labels:
    - porn
    - violence
    - political
    - discrimination
  # 允许管理员绕过审核
  allow-admin-bypass: true
