server:
  port: 8083

spring:
  application:
    name: agent-server
  profiles:
    active: dev
  cloud:
    config:
      enabled: true
      uri: http://localhost:8888
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
        group: DEFAULT_GROUP
        metadata:
          version: 1.0.0
          region: beijing
          zone: zone1
  redis:
    host: localhost
    port: 6379
    password: 
    database: 4
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

# Dify配置
dify:
  api:
    base-url: http://localhost/v1
    api-key: your-dify-api-key
    timeout: 30000
    max-retries: 3
  agent:
    default-model: gpt-3.5-turbo
    max-tokens: 1000
    temperature: 0.7

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

resilience4j:
  circuitbreaker:
    instances:
      difyAgent:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: TIME_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
  retry:
    instances:
      difyAgent:
        maxAttempts: 3
        waitDuration: 1000ms
        exponentialBackoffMultiplier: 2

logging:
  level:
    org.example.agentserver: DEBUG
    org.springframework.cloud: DEBUG
